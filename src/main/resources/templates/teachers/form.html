<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teacher Form</h1>

    <form action="/teachers/save" method="post" th:object="${teacher}">
        <input type="hidden" th:field="*{id}">
        <input type="text" th:field="*{firstName}" placeholder="First Name" required>
        <br><br>
        <input type="text" th:field="*{lastName}" placeholder="Last Name" required>
        <br><br>
        <input type="email" th:field="*{email}" placeholder="Email" required>
        <br><br>
        <button type="submit">Save</button>
    </form>
    <br>
    <a href="/teachers">Back to List</a>
</body>
</html>
