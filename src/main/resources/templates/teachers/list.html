<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teachers</h1>

    <a href="/teachers/new">Add New Teacher</a>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Aquí se iterarán los profesores -->
            <tr th:each="teacher : ${teachers}">
                <td th:text="${teacher.id}"></td>
                <td th:text="${teacher.firstName + ' ' + teacher.lastName}"></td>
                <td th:text="${teacher.email}"></td>
                <td>
                    <a th:href="@{/teachers/edit/{id}(id=${teacher.id})}">Edit</a>
                    <a th:href="@{/teachers/delete/{id}(id=${teacher.id})}" onclick="return confirm('Are you sure you want to delete this teacher?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
