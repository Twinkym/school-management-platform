<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <h1>Teachers</h1>

    <a href="/teachers/new">Add New Teacher</a>

    <table border="1">
        <thead>
            <tr>
                <th>Photo</th>
                <th>Code</th>
                <th>Teacher</th>
                <th>Department</th>
                <th>Subject</th>
                <th>Email</th>
                <th>Specialization</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Aquí se iterarán los profesores -->
            <tr th:each="teacher : ${teachers}">
                <td>
                    <img class="avatar" th:src="${teacher.profilePictureUrl != null ? teacher.profilePictureUrl : '/images/default-avatar.png'}" alt="Profile Picture" width="50" height="50">
                </td>
                <td th:text="${teacher.teacherCode}"></td>
                <td th:text="${teacher.firstName + ' ' + teacher.lastName}"></td>
                <td th:text="${teacher.department}"></td>
                <td th:text="${teacher.subject}"></td>
                <td th:text="${teacher.email}"></td>
                <td th:text="${teacher.specialization}"></td>
                <td th:text="${teacher.active ? 'Active' : 'Inactive'}">
                    <span class="badge active" th:if="${teacher.active}">
                        Active
                    </span>
                    <span class="badge inactive" th:if="${!teacher.active}">
                        Inactive
                    </span>
                </td>
                <td>
                    <a th:href="@{/teachers/edit/{id}(id=${teacher.id})}">
                        Edit
                    </a>

                    |

                    <a th:href="@{/teachers/delete/{id}(id=${teacher.id})}" 
                       onclick="return confirm('Are you sure you want to delete this teacher?')">
                       Delete
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(teachers)}">
                <td colspan="4" align="center">No teachers Registered.</td>
            </tr>
        </tbody>
    </table>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
